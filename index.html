<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match | Oxbridge Tutorial College</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

  <main id="gameApp" class="app" aria-label="Memory Match game application">
    <header class="brand-header">
      <div id="logoWrap" class="logo-wrap" aria-label="School branding">
        <img id="schoolLogo" src="assets/logo/logo.png" alt="Oxbridge Tutorial College Logo" />
        <span id="logoFallback" class="logo-fallback" hidden>Oxbridge Tutorial College</span>
      </div>

      <div class="heading-wrap">
        <p class="kicker">Oxbridge Interactive Learning</p>
        <h1>Memory Match</h1>
      </div>

      <div class="header-actions">
        <a class="btn btn-secondary" href="/games">Return to Games</a>
        <button id="fullscreenBtn" class="btn btn-secondary" type="button">Fullscreen</button>
      </div>
    </header>

    <section class="panel">
      <div class="controls">
        <div class="control-group">
          <label for="difficultySelect">Difficulty</label>
          <select id="difficultySelect" aria-label="Select difficulty">
            <option value="easy">Easy (4x4)</option>
            <option value="medium">Medium (4x5)</option>
            <option value="hard">Hard (4x6)</option>
          </select>
        </div>

        <div class="control-buttons">
          <button id="startBtn" class="btn btn-primary" type="button">Start Game</button>
          <button id="restartBtn" class="btn btn-primary" type="button">Restart Game</button>
          <button id="soundBtn" class="btn btn-secondary" type="button" aria-pressed="true">Sound: On</button>
        </div>
      </div>

      <div class="stats" aria-live="polite">
        <p><strong>Moves:</strong> <span id="movesCount">0</span></p>
        <p><strong>Matched Pairs:</strong> <span id="matchedCount">0</span>/<span id="totalPairsCount">8</span></p>
        <p><strong>Time:</strong> <span id="timeCount">00:00</span></p>
      </div>

      <div id="board" class="board" role="grid" aria-label="Memory cards board"></div>

      <section id="endScreen" class="end-screen" hidden aria-live="polite">
        <h2>Excellent work!</h2>
        <p id="endSummary">You matched all cards.</p>
        <button id="playAgainBtn" class="btn btn-primary" type="button">Play Again</button>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
