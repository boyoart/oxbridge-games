<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Strategy | Oxbridge Tutorial College</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-overlay" aria-hidden="true"></div>
  <main id="gameApp" class="app-shell">
    <header class="brand-header" aria-label="Oxbridge Tutorial College Header">
      <div class="header-shine" aria-hidden="true"></div>
      <div class="header-center">
        <div class="logo-wrap" id="logoWrap">
          <img src="assets/logo/logo.png" alt="Oxbridge Tutorial College Logo" id="schoolLogo" />
          <span class="logo-fallback" id="logoFallback">Oxbridge Tutorial College</span>
        </div>
        <div class="title-wrap">
          <h1>OXBRIDGE TUTORIAL COLLEGE</h1>
          <p class="subtitle">Interactive Chess Strategy</p>
        </div>
      </div>
      <p class="turn-badge" id="headerTurnIndicator">White to move</p>
    </header>

    <section class="game-card" id="gameContainer">
      <div class="board-shell">
        <div class="board-scene" aria-label="Front-facing premium chessboard scene">
          <div class="board-shadow" aria-hidden="true"></div>
          <div class="board-stage">
            <div class="board-frame">
              <div class="board-crest" aria-hidden="true">
                <span class="crest-ring"></span>
                <span class="crest-wordmark">OXBRIDGE</span>
              </div>
              <div id="board" class="board" role="grid" aria-label="Chess board"></div>
            </div>
            <div class="board-edge board-edge-front" aria-hidden="true"></div>
            <div class="board-edge board-edge-right" aria-hidden="true"></div>
            <div class="board-edge board-edge-left" aria-hidden="true"></div>
          </div>
        </div>
      </div>

      <section class="control-console" aria-label="Game controls and timer panel">
        <article class="timer-panel ivory" id="whitePanel">
          <p class="timer-label">WHITE · YOU</p>
          <p class="timer-value" id="whiteTimer">05:00</p>
        </article>

        <div class="console-center">
          <div class="status-row">
            <p class="status-pill" id="turnStatus">Your turn (Ivory)</p>
            <p class="status-pill" id="gameStatus">Ready to play.</p>
          </div>

          <div class="controls-row controls-row-stack">
            <label for="difficulty">AI Difficulty</label>
            <select id="difficulty" aria-label="AI difficulty">
              <option value="1">Scholar (Easy)</option>
              <option value="2" selected>Oxford (Medium)</option>
              <option value="3">Master (Hard)</option>
            </select>
          </div>

          <div class="control-buttons">
            <button class="btn" id="restartBtn" type="button">Restart</button>
            <button class="btn" id="undoBtn" type="button">Undo</button>
            <button class="btn" id="fullscreenBtn" type="button">Fullscreen</button>
            <a class="btn btn-ghost" href="/games">Return to Games</a>
          </div>
        </div>

        <article class="timer-panel red" id="redPanel">
          <p class="timer-label">RED · COMPUTER</p>
          <p class="timer-value" id="redTimer">05:00</p>
        </article>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
