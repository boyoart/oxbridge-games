<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oxbridge Ludo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="screen" id="screen">
    <section id="setupScreen" class="setup-card">
      <h1>Oxbridge Ludo</h1>
      <p class="setup-copy">Easy: capturing sends enemy to base and your token directly home. Hard: capturing sends enemy to base but your token stays on board.</p>
      <div class="setup-row">
        <label for="playerName">Your Name</label>
        <input id="playerName" maxlength="20" placeholder="Enter name" />
      </div>
      <div class="setup-row">
        <label for="difficulty">Difficulty</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div class="setup-actions">
        <button id="singleBtn">Single Player</button>
        <button id="localBtn">Local Multiplayer</button>
        <button id="createRoomBtn">Create Online Room</button>
      </div>
      <div class="setup-row inline">
        <input id="roomCodeInput" maxlength="6" placeholder="Room code" />
        <button id="joinRoomBtn">Join Room</button>
      </div>
      <button id="startOnlineBtn" class="hidden">Start Online Match</button>
      <p id="connectionStatus">Connection: Offline</p>
    </section>

    <section id="gameScreen" class="hidden">
      <header class="top-bar">
        <div class="brand-wrap" id="brandWrap">
          <img id="brandLogo" class="brand-logo" src="assets/logo/logo.png" alt="Oxbridge logo" />
          <div id="brandFallback" class="brand-fallback hidden">Oxbridge Tutorial College</div>
        </div>
        <div id="turnBanner">Waiting...</div>
        <div class="controls">
          <button id="restartBtn">Restart</button>
          <button id="fullscreenBtn">Fullscreen</button>
          <button id="soundToggleBtn">Sound On</button>
          <a href="/games">Return to Games</a>
        </div>
      </header>

      <div class="layout">
        <aside class="panel" id="leftPanel">
          <div id="placementsPanel"></div>
          <div id="victoryWrap" class="victory-wrap">
            <h3>Shared Victory Container</h3>
            <div id="victoryContainer" class="victory-container"></div>
          </div>
        </aside>

        <section class="board-shell">
          <div id="board" class="board"></div>
          <button id="diceCenter" class="dice-center" aria-label="Roll dice">
            <div id="dieA" class="die">1</div>
            <div id="dieB" class="die">1</div>
          </button>
          <div id="guideHand" class="guide-hand hidden">👇</div>
        </section>

        <aside class="panel" id="statusPanel"></aside>
      </div>

      <div class="bottom-balls" id="ballTray">
        <button data-ball="a" class="ball disabled">0</button>
        <button data-ball="b" class="ball disabled">0</button>
        <button data-ball="sum" class="ball disabled">0</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
