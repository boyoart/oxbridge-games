<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Oxbridge Tutorial College Memory Match game" />
  <title>Memory Match | Oxbridge Tutorial College</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page" id="gameApp">
    <section class="game-shell" aria-label="Memory Match Game">
      <header class="game-header">
        <div class="brand-wrap">
          <img
            src="assets/logo/logo.png"
            alt="Oxbridge Tutorial College Logo"
            class="school-logo"
            id="schoolLogo"
          />
          <span class="logo-fallback" id="logoFallback">Oxbridge Tutorial College</span>
        </div>
        <div class="title-wrap">
          <h1>Memory Match</h1>
          <p>Flip, remember, and match every pair.</p>
        </div>
      </header>

      <section class="controls" aria-label="Game Controls">
        <div class="difficulty-wrap">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty" aria-label="Select difficulty level">
            <option value="easy">Easy (4x4)</option>
            <option value="medium">Medium (4x5)</option>
            <option value="hard">Hard (4x6)</option>
          </select>
        </div>

        <div class="button-row">
          <button id="startBtn" class="btn">Start Game</button>
          <button id="restartBtn" class="btn">Restart Game</button>
          <button id="fullscreenBtn" class="btn">Fullscreen</button>
          <a href="/games" class="btn btn-link" id="returnBtn">Return to Games</a>
        </div>
      </section>

      <section class="stats" aria-label="Game Stats">
        <article class="stat-card">
          <h2>Moves</h2>
          <p id="movesCount">0</p>
        </article>
        <article class="stat-card">
          <h2>Matched</h2>
          <p><span id="matchedCount">0</span>/<span id="totalPairs">8</span></p>
        </article>
        <article class="stat-card">
          <h2>Time</h2>
          <p id="timeCount">00:00</p>
        </article>
        <article class="stat-card sound-toggle-card">
          <h2>Sound</h2>
          <button id="soundToggle" class="btn small">On</button>
        </article>
      </section>

      <section class="board-wrap">
        <div id="gameBoard" class="game-board" aria-live="polite"></div>
      </section>

      <section id="endScreen" class="end-screen hidden" role="dialog" aria-modal="true" aria-labelledby="endTitle">
        <div class="end-content">
          <h2 id="endTitle">Well done!</h2>
          <p id="endMessage">You completed the challenge.</p>
          <button id="playAgainBtn" class="btn">Play Again</button>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
