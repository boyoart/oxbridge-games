<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>2048 Puzzle | Oxbridge Tutorial College</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" id="app">
    <header class="brand-header" aria-label="Oxbridge game header">
      <div class="brand-mark-wrap" data-logo-wrap>
        <img src="assets/logo/logo.png" alt="Oxbridge Tutorial College Logo" class="brand-logo" data-brand-logo />
        <span class="logo-fallback" data-logo-fallback>Oxbridge Tutorial College</span>
      </div>
      <div class="brand-copy">
        <p class="brand-kicker">Oxbridge Tutorial College</p>
        <h1>2048 Puzzle</h1>
        <p class="brand-subtitle">Slide, merge, and plan your way to 2048</p>
      </div>
      <div class="top-actions">
        <a class="ghost-btn" href="/games">← Return to Games</a>
        <button id="fullscreenBtn" class="ghost-btn" type="button">⛶ Fullscreen</button>
      </div>
    </header>

    <section class="game-shell" aria-live="polite">
      <div class="hud-row">
        <div class="score-box">
          <p class="label">Score</p>
          <p id="score" class="value">0</p>
        </div>
        <div class="score-box">
          <p class="label">Best</p>
          <p id="bestScore" class="value">0</p>
        </div>
        <button id="restartBtn" class="primary-btn" type="button">Restart</button>
      </div>

      <p class="hint">Use arrow keys or swipe. Combine matching tiles to reach 2048.</p>

      <div class="board-wrap">
        <div id="board" class="board" role="application" aria-label="2048 game board"></div>
      </div>

      <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
        <div class="overlay-card">
          <h2 id="overlayTitle">Game Over</h2>
          <p id="overlayMessage">Try again and beat your best score!</p>
          <div class="overlay-actions">
            <button id="playAgainBtn" class="primary-btn" type="button">Play Again</button>
            <button id="continueBtn" class="ghost-btn hidden" type="button">Continue</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
